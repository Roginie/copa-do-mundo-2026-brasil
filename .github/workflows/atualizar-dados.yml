name: Atualizar Dados

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: atualizar-dados
  cancel-in-progress: true

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Buscar resultados e atualizar data.json
        run: node scripts/atualizar.mjs
      - name: Commitar se houve mudança
        run: |
          if [ -n "$(git status --porcelain data.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data.json
            git commit -m "chore: atualiza resultados automaticamente"
            git push
          else
            echo "Sem mudancas em data.json."
          fi
